name: "GCP Authentication"
description: "Authenticates to Google Cloud and sets up gcloud SDK with Artifact Registry"

inputs:
  wif-provider:
    description: "Workload Identity Provider"
    required: true
  service-account:
    description: "Service Account Email"
    required: true
  region:
    description: "GCP Region for Artifact Registry"
    required: false
    default: "europe-west1"

runs:
  using: "composite"
  steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.wif-provider }}
        service_account: ${{ inputs.service-account }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker Auth
      shell: bash
      run: |
        gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev
